<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberCore v2 | 3D Showcase</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        .ui-overlay { position: relative; z-index: 2; width: 320px; height: 100vh; padding: 40px; pointer-events: none; background: rgba(0,0,0,0.7); }
        .ui-overlay * { pointer-events: auto; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--neon); margin: 0; }
        .spec-card { background: rgba(255,255,255,0.05); border-left: 3px solid var(--neon); padding: 10px; margin: 20px 0; font-size: 0.8rem; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 10px; cursor: pointer; font-size: 0.6rem; text-transform: uppercase; }
        button:hover { background: var(--neon); color: black; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="ui-overlay">
        <h1>CYBERCORE V2</h1>
        <div class="spec-card"><strong>3D PROJECT</strong><br>Tech Fair 2026 Showcase</div>
        <div class="controls">
            <button onclick="explodePC()">EXPLODE</button>
            <button onclick="resetPC()">ASSEMBLE</button>
            <button id="rot-btn" onclick="toggleRotation()">ROTATION: ON</button>
            <button onclick="changeColor(0xff0000)">RED MODE</button>
        </div>
    </div>

    <!-- DIRECT LIBS (No Import Maps) -->
    <script src="https://cloudflare.com"></script>
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    <script src="https://cloudflare.com"></script>

    <script>
        // Check if Three.js loaded
        if (typeof THREE === 'undefined') {
            document.body.innerHTML = "<h1 style='color:red; padding:50px;'>Error: Libraries failed to load. Check your internet connection.</h1>";
        }

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 2, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1));
        const topLight = new THREE.DirectionalLight(0xffffff, 2);
        topLight.position.set(5, 10, 5);
        scene.add(topLight);

        const rgbLight = new THREE.PointLight(0x00f2ff, 20, 10);
        scene.add(rgbLight);

        // Standard JS way to call Addons
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        
        let pc, isRotating = true;
        const loader = new THREE.GLTFLoader();
        
        loader.load('./gaming_computer.glb', function(gltf) {
            pc = gltf.scene;
            pc.scale.set(1.5, 1.5, 1.5);
            scene.add(pc);
            console.log("Model loaded!");
        }, undefined, function(err) {
            console.error("Model Error:", err);
        });

        window.toggleRotation = () => { isRotating = !isRotating; };
        window.explodePC = () => {
            if (pc) pc.traverse(n => { if (n.isMesh) gsap.to(n.position, { x: (Math.random()-0.5)*10, y: (Math.random()-0.5)*10, z: (Math.random()-0.5)*10, duration: 1.5 }); });
        };
        window.resetPC = () => {
            if (pc) pc.traverse(n => { if (n.isMesh) gsap.to(n.position, { x: 0, y: 0, z: 0, duration: 1 }); });
        };
        window.changeColor = (hex) => { rgbLight.color.setHex(hex); };

        function animate() {
            requestAnimationFrame(animate);
            if (isRotating && pc) pc.rotation.y += 0.005;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
