<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberCore v2 | Fixed Load</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        .ui-overlay { position: relative; z-index: 2; width: 320px; padding: 40px; pointer-events: none; }
        .ui-overlay * { pointer-events: auto; }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; }
        button { background: rgba(0,242,255,0.1); border: 1px solid var(--neon); color: var(--neon); padding: 8px 12px; cursor: pointer; border-radius: 4px; font-size: 11px; }
        button:hover { background: var(--neon); color: black; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="ui-overlay">
        <h1>CYBERCORE V2</h1>
        <div class="controls">
            <button onclick="explodePC()">EXPLODE</button>
            <button onclick="resetPC()">ASSEMBLE</button>
            <button onclick="changeColor(0xff0044)">RED MODE</button>
        </div>
    </div>

    <script src="https://cloudflare.com"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://jsdelivr.net",
            "three/addons/": "https://jsdelivr.net"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const pointLight = new THREE.PointLight(0x00f2ff, 20, 20);
        scene.add(pointLight);

        const pcGroup = new THREE.Group();
        const originalData = new Map();

        function addPart(w, h, d, col, pos, name) {
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(w, h, d),
                new THREE.MeshPhongMaterial({ color: col, emissive: col, emissiveIntensity: 0.2 })
            );
            mesh.position.copy(pos);
            pcGroup.add(mesh);
            originalData.set(mesh.uuid, pos.clone());
        }

        // Build simple PC parts
        addPart(3, 4, 4, 0x111111, new THREE.Vector3(0,0,0), 'case'); // Chassis
        addPart(0.1, 3.5, 3.5, 0x222222, new THREE.Vector3(-1.4, 0, 0), 'mobo'); // Motherboard
        addPart(1.5, 0.4, 2.5, 0x333333, new THREE.Vector3(0.3, -0.5, 0.5), 'gpu'); // GPU

        scene.add(pcGroup);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        window.explodePC = () => {
            pcGroup.children.forEach(c => {
                gsap.to(c.position, { x: (Math.random()-0.5)*10, y: (Math.random()-0.5)*10, z: (Math.random()-0.5)*10, duration: 1 });
            });
        };

        window.resetPC = () => {
            pcGroup.children.forEach(c => {
                const orig = originalData.get(c.uuid);
                gsap.to(c.position, { x: orig.x, y: orig.y, z: orig.z, duration: 1 });
            });
        };

        window.changeColor = (hex) => {
            pointLight.color.setHex(hex);
        };

        function animate() {
            requestAnimationFrame(animate);
            pcGroup.rotation.y += 0.005;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
