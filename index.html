<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberCore v2 | GitHub Ready</title>
    <!-- Tech Aesthetic Fonts -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        .ui-overlay { position: relative; z-index: 2; width: 350px; height: 100vh; padding: 60px 40px; pointer-events: none; background: linear-gradient(to right, rgba(0,0,0,0.95), transparent); }
        .ui-overlay * { pointer-events: auto; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; color: var(--neon); margin: 0; text-shadow: 0 0 15px var(--neon); }
        .tagline { letter-spacing: 4px; text-transform: uppercase; font-size: 0.7rem; opacity: 0.6; margin-bottom: 15px; }
        .spec-card { background: var(--glass); border-left: 3px solid var(--neon); padding: 15px; margin: 25px 0; border-radius: 0 8px 8px 0; backdrop-filter: blur(10px); font-size: 0.85rem; line-height: 1.5; border-top: 1px solid rgba(255,255,255,0.05); }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
        button { background: rgba(0, 242, 255, 0.05); border: 1px solid var(--neon); color: var(--neon); padding: 10px; cursor: pointer; font-family: 'Orbitron', sans-serif; font-size: 0.65rem; transition: 0.2s; border-radius: 4px; text-transform: uppercase; }
        button:hover { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="ui-overlay">
        <p class="tagline">GitHub Pages Edition</p>
        <h1>CYBERCORE V2</h1>
        <div class="spec-card">
            <strong>Procedural Build</strong><br>
            Zero external assets. All components are generated via Three.js primitives.
        </div>
        <div class="controls">
            <button onclick="explodePC()">Explode View</button>
            <button onclick="resetPC()">Assemble</button>
            <button id="rot-btn" onclick="toggleRotation()">Rotation: ON</button>
            <button onclick="changeColor(0xff0055)">Pulse Red</button>
        </div>
    </div>

    <!-- Essential Libraries -->
    <script src="https://cloudflare.com"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com",
            "three/addons/": "https://unpkg.com"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        const container = document.getElementById('canvas-container');
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // 2. LIGHTING
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));
        const pointLight = new THREE.PointLight(0x00f2ff, 15, 12);
        pointLight.position.set(0, 0, 0);
        scene.add(pointLight);

        // 3. BUILD PC COMPONENTS
        const pcGroup = new THREE.Group();
        const fans = [];
        const originalData = new Map();

        function addComponent(geom, color, pos, name, isGlass = false) {
            const mat = new THREE.MeshPhongMaterial({ 
                color: color, 
                transparent: isGlass, 
                opacity: isGlass ? 0.2 : 1,
                emissive: color,
                emissiveIntensity: 0.1,
                shininess: 100
            });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.copy(pos);
            mesh.name = name;
            pcGroup.add(mesh);
            originalData.set(mesh.uuid, pos.clone());
            return mesh;
        }

        // Case Chassis
        addComponent(new THREE.BoxGeometry(3.2, 4.2, 4.2), 0x111111, new THREE.Vector3(0,0,0), 'case');
        // Glass Side Panel
        addComponent(new THREE.BoxGeometry(0.05, 4, 4), 0x00f2ff, new THREE.Vector3(1.6,0,0), 'glass', true);
        // Motherboard
        addComponent(new THREE.BoxGeometry(0.1, 3.8, 3.8), 0x1a1a1a, new THREE.Vector3(-1.4,0,0), 'mobo');
        // GPU
        addComponent(new THREE.BoxGeometry(1.8, 0.4, 2.8), 0x222222, new THREE.Vector3(0.2,-0.5,0.5), 'gpu');
        // CPU Cooler
        addComponent(new THREE.BoxGeometry(0.8, 0.8, 0.8), 0x333333, new THREE.Vector3(-1, 1, 0), 'cooler');

        // RGB Fans (Cylinders)
        for(let i=0; i<3; i++) {
            const fan = addComponent(new THREE.CylinderGeometry(0.5, 0.5, 0.1, 12), 0x00f2ff, new THREE.Vector3(-1.3, 1.2 - (i*1.2), 1.8), 'fan');
            fan.rotation.z = Math.PI / 2;
            fan.material.wireframe = true;
            fans.push(fan);
        }

        scene.add(pcGroup);

        // 4. INTERACTIVITY LOGIC
        let isRotating = true;
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        window.toggleRotation = () => {
            isRotating = !isRotating;
            document.getElementById('rot-btn').innerText = `Rotation: ${isRotating ? 'ON' : 'OFF'}`;
        };

        window.explodePC = () => {
            pcGroup.children.forEach(child => {
                gsap.to(child.position, {
                    x: (Math.random() - 0.5) * 8,
                    y: (Math.random() - 0.5) * 8,
                    z: (Math.random() - 0.5) * 8,
                    duration: 1.5,
                    ease: "power4.out"
                });
            });
        };

        window.resetPC = () => {
            pcGroup.children.forEach(child => {
                const orig = originalData.get(child.uuid);
                gsap.to(child.position, { x: orig.x, y: orig.y, z: orig.z, duration: 1.2, ease: "back.out(1.2)" });
            });
        };

        window.changeColor = (hex) => {
            pointLight.color.setHex(hex);
            pcGroup.traverse(n => {
                if (n.material && (n.name === 'fan' || n.name === 'glass')) {
                    n.material.color.setHex(hex);
                    n.material.emissive.setHex(hex);
                }
            });
        };

        // 5. ANIMATION LOOP
        function animate() {
            requestAnimationFrame(animate);
            if (isRotating) pcGroup.rotation.y += 0.005;
            
            // Spin fans individually
            fans.forEach(f => f.rotation.y += 0.15);

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Responsive Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
