<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberCore v2 | Fix Visibility</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #050505; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; }
        
        /* Force canvas to be visible and fill screen */
        #canvas-container { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100vw; 
            height: 100vh; 
            z-index: 0; /* Behind UI but visible */
            display: block;
        }

        .ui-overlay { 
            position: relative; 
            z-index: 10; 
            width: 300px; 
            padding: 40px; 
            pointer-events: none; 
            color: white;
        }
        .ui-overlay * { pointer-events: auto; }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--neon); text-shadow: 0 0 10px var(--neon); margin: 0; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        button { 
            background: rgba(0, 242, 255, 0.1); 
            border: 1px solid var(--neon); 
            color: var(--neon); 
            padding: 10px 15px; 
            cursor: pointer; 
            border-radius: 4px; 
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
        }
        button:hover { background: var(--neon); color: black; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="ui-overlay">
        <h1>CYBERCORE V2</h1>
        <p>If you see a dark gray screen, the 3D engine is running.</p>
        <div class="controls">
            <button onclick="explodePC()">EXPLODE</button>
            <button onclick="resetPC()">ASSEMBLE</button>
        </div>
    </div>

    <!-- GSAP for animations -->
    <script src="https://cloudflare.com"></script>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://jsdelivr.net",
            "three/addons/": "https://jsdelivr.net"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. SCENE & RENDERER
        const scene = new THREE.Scene();
        // Set a dark gray background so you can confirm the canvas is rendering
        scene.background = new THREE.Color(0x111111); 

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 4, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 2. LIGHTS (Crucial: Mesh is black without these)
        const ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);
        const point = new THREE.PointLight(0x00f2ff, 50, 20);
        point.position.set(5, 5, 5);
        scene.add(point);

        // 3. PC MODEL
        const pcGroup = new THREE.Group();
        const originalData = new Map();

        function createBox(w, h, d, color, x, y, z) {
            const geom = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshPhongMaterial({ color: color });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.set(x, y, z);
            pcGroup.add(mesh);
            originalData.set(mesh.uuid, mesh.position.clone());
        }

        // Create parts (Centralized for visibility)
        createBox(3, 4.5, 4, 0x222222, 0, 0, 0); // Case
        createBox(0.2, 3.8, 3.8, 0x444444, -1.4, 0, 0); // Motherboard
        createBox(2, 0.5, 3, 0x00f2ff, 0.2, -0.5, 0.2); // GPU (Cyan)

        scene.add(pcGroup);

        // 4. CONTROLS
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 5. GLOBAL ACTIONS
        window.explodePC = () => {
            pcGroup.children.forEach(c => {
                gsap.to(c.position, { 
                    x: (Math.random() - 0.5) * 10, 
                    y: (Math.random() - 0.5) * 10, 
                    z: (Math.random() - 0.5) * 10, 
                    duration: 1 
                });
            });
        };

        window.resetPC = () => {
            pcGroup.children.forEach(c => {
                const orig = originalData.get(c.uuid);
                gsap.to(c.position, { x: orig.x, y: orig.y, z: orig.z, duration: 1 });
            });
        };

        // 6. LOOP
        function animate() {
            requestAnimationFrame(animate);
            pcGroup.rotation.y += 0.005;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Handle Resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
