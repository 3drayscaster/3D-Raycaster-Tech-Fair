<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberCore v2 | Tech Fair 2026</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #050505; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        .model-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        iframe { width: 100%; height: 100%; border: none; }
        .interface { position: relative; z-index: 10; width: 350px; height: 100vh; padding: 60px 40px; pointer-events: none; background: linear-gradient(to right, rgba(0,0,0,0.9), transparent); }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 2.2rem; color: var(--neon); margin: 0; text-shadow: 0 0 15px var(--neon); }
        .data-card { background: rgba(255, 255, 255, 0.03); border-left: 2px solid var(--neon); padding: 15px; margin: 20px 0; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="model-container">
        <!-- The Fix: Added sandbox permissions and rs:embed parameter -->
        <iframe 
            title="Custom Gaming PC" 
            src="https://sketchfab.com" 
            allow="autoplay; fullscreen; xr-spatial-tracking" 
            sandbox="allow-scripts allow-same-origin allow-popups allow-forms"
            allowfullscreen>
        </iframe>
    </div>

    <div class="interface">
        <p style="letter-spacing: 3px; font-size: 0.7rem; opacity: 0.6;">Interactive Demo</p>
        <h1>CYBERCORE V2</h1>
        <div class="data-card"><strong>HARDWARE STATUS: ONLINE</strong><br>Loading 3D Module...</div>
        <div class="data-card">Drag to Rotate<br>Scroll to Zoom</div>
    </div>

</body>
</html>
