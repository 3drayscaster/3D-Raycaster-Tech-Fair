<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberCore v2 | 3D Showcase</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; overflow: hidden; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
        .ui-overlay { position: relative; z-index: 2; width: 320px; height: 100vh; padding: 40px; pointer-events: none; background: rgba(0,0,0,0.8); }
        .ui-overlay * { pointer-events: auto; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 2rem; color: var(--neon); margin: 0; text-shadow: 0 0 10px var(--neon); }
        .spec-card { background: rgba(255,255,255,0.05); border-left: 3px solid var(--neon); padding: 12px; margin: 20px 0; font-size: 0.85rem; line-height: 1.4; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { background: transparent; border: 1px solid var(--neon); color: var(--neon); padding: 10px; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: var(--neon); color: black; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div class="ui-overlay">
        <h1>CYBERCORE V2</h1>
        <div class="spec-card"><strong>3D SYSTEM INSPECTOR</strong><br>Status: Online<br>Mode: Tech Fair Showcase</div>
        <div class="controls">
            <button onclick="window.explodePC()">EXPLODE</button>
            <button onclick="window.resetPC()">ASSEMBLE</button>
            <button id="rot-btn" onclick="window.toggleRotation()">ROTATION: ON</button>
            <button onclick="window.changeColor(0xff0000)">RED MODE</button>
        </div>
    </div>

    <!-- GSAP for the "Explode" animation -->
    <script src="https://cloudflare.com"></script>

    <script type="module">
        import * as THREE from 'https://jsdelivr.net';
        import { OrbitControls } from 'https://jsdelivr.net';
        import { GLTFLoader } from 'https://jsdelivr.net';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        const light = new THREE.DirectionalLight(0xffffff, 2.5);
        light.position.set(5, 10, 5);
        scene.add(light);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        let pc, isRotating = true;
        const loader = new GLTFLoader();

        // LOADING THE MODEL
        loader.load('./gaming_computer.glb', (gltf) => {
            pc = gltf.scene;
            pc.scale.set(1.5, 1.5, 1.5);
            scene.add(pc);
            console.log("Model loaded successfully");
        }, undefined, (err) => {
            console.error("Loading Error:", err);
            // If it fails, let's add a cube so you see something
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            pc = new THREE.Mesh(geometry, material);
            scene.add(pc);
        });

        // ATTACH FUNCTIONS TO WINDOW (So buttons work)
        window.toggleRotation = () => { 
            isRotating = !isRotating; 
            document.getElementById('rot-btn').innerText = `ROTATION: ${isRotating ? 'ON' : 'OFF'}`;
        };

        window.explodePC = () => {
            if (pc) pc.traverse(n => { 
                if (n.isMesh) gsap.to(n.position, { x: (Math.random()-0.5)*10, y: (Math.random()-0.5)*10, z: (Math.random()-0.5)*10, duration: 1.5 }); 
            });
        };

        window.resetPC = () => {
            if (pc) pc.traverse(n => { 
                if (n.isMesh) gsap.to(n.position, { x: 0, y: 0, z: 0, duration: 1 }); 
            });
        };

        window.changeColor = (hex) => {
            if (pc) pc.traverse(n => { if(n.material) n.material.color.setHex(hex); });
        };

        function animate() {
            requestAnimationFrame(animate);
            if (isRotating && pc) pc.rotation.y += 0.005;
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
