<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberCore v2 | 3D Showcase</title>
    <!-- Google Fonts for Tech Aesthetic -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        #canvas-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }

        .ui-overlay {
            position: relative; z-index: 2; width: 350px; height: 100vh;
            padding: 60px 40px; pointer-events: none;
            background: linear-gradient(to right, rgba(0,0,0,0.9), transparent);
        }
        .ui-overlay * { pointer-events: auto; }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 2.5rem; color: var(--neon); margin: 0; text-shadow: 0 0 15px var(--neon); }
        .tagline { letter-spacing: 4px; text-transform: uppercase; font-size: 0.8rem; opacity: 0.6; margin-bottom: 20px; }

        .spec-card {
            background: var(--glass); border-left: 3px solid var(--neon);
            padding: 15px; margin: 30px 0; border-radius: 0 10px 10px 0;
            backdrop-filter: blur(12px); font-size: 0.9rem; line-height: 1.6;
        }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 30px; }
        button {
            background: transparent; border: 1px solid var(--neon); color: var(--neon);
            padding: 12px; cursor: pointer; font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem; transition: 0.3s; border-radius: 4px;
            text-transform: uppercase;
        }
        button:hover { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); }
        
        #annotation {
            position: absolute; display: none; background: black; color: var(--neon);
            padding: 8px 12px; border: 1px solid var(--neon); border-radius: 4px;
            font-size: 0.8rem; pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="annotation">Component Info</div>
    <div id="canvas-container"></div>

    <div class="ui-overlay">
        <p class="tagline">Tech Fair Concept 2026</p>
        <h1>CYBERCORE V2</h1>
        
        <div class="spec-card">
            <strong>Active RGB Sync</strong><br>
            Dynamic lighting reacts to system load. Cycle colors below.
        </div>

        <div class="spec-card">
            <strong>Modular Design</strong><br>
            Use "Exploded View" to inspect the components.
        </div>

        <div class="controls">
            <button onclick="explodePC()">EXPLODE</button>
            <button onclick="resetPC()">ASSEMBLE</button>
            <button id="rot-btn" onclick="toggleRotation()">ROTATION: ON</button>
            <button onclick="changeColor(0xff0000)">RED MODE</button>
        </div>
    </div>

    <!-- Fix for CORS and Browser Compatibility -->
    <script async src="https://unpkg.com"></script>
    <script src="https://cloudflare.com"></script>
    
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com",
          "three/addons/": "https://unpkg.com"
        }
      }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. SETUP
        const scene = new THREE.Scene();
        const container = document.getElementById('canvas-container');
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 2, 6);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // 2. LIGHTS
        const ambient = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambient);
        const topLight = new THREE.DirectionalLight(0xffffff, 2);
        topLight.position.set(5, 10, 5);
        scene.add(topLight);

        const rgbLight = new THREE.PointLight(0x00f2ff, 20, 10);
        rgbLight.position.set(0, 0, 0); 
        scene.add(rgbLight);

        // 3. CONTROLS
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 4. MODEL LOADING
        let pc, hue = 0, isRotating = true;
        const loader = new GLTFLoader();
        
        // This path looks for the file in the SAME folder on GitHub
        loader.load('./gaming_computer.glb', (gltf) => {
            pc = gltf.scene;
            pc.scale.set(1.5, 1.5, 1.5);
            scene.add(pc);
            console.log("Success: Model loaded!");
        }, undefined, (error) => {
            console.error("Critical Error: Model could not load.", error);
        });

        // 5. INTERACTIVE FUNCTIONS
        window.toggleRotation = () => {
            isRotating = !isRotating;
            document.getElementById('rot-btn').innerText = `ROTATION: ${isRotating ? 'ON' : 'OFF'}`;
        };

        window.explodePC = () => {
            if (!pc) return;
            pc.traverse(n => {
                if (n.isMesh) {
                    gsap.to(n.position, { 
                        x: (Math.random()-0.5)*6, 
                        y: (Math.random()-0.5)*6, 
                        z: (Math.random()-0.5)*6, 
                        duration: 1.5, 
                        ease: "expo.out" 
                    });
                }
            });
        };

        window.resetPC = () => {
            if (!pc) return;
            pc.traverse(n => { 
                if (n.isMesh) gsap.to(n.position, { x: 0, y: 0, z: 0, duration: 1, ease: "power2.inOut" }); 
            });
        };

        window.changeColor = (hex) => {
            rgbLight.color.setHex(hex);
            if (pc) {
                pc.traverse(n => { 
                    if(n.material && n.material.emissive) n.material.emissive.setHex(hex); 
                });
            }
        };

        // 6. ANIMATION LOOP
        function animate() {
            requestAnimationFrame(animate);
            
            // RGB Hue Cycle
            hue += 0.002;
            if (hue > 1) hue = 0;
            if (rgbLight.color.getHex() !== 0xff0000) { 
                rgbLight.color.setHSL(hue, 1, 0.5);
            }

            if (isRotating && pc) pc.rotation.y += 0.005;

            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // Responsive Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
